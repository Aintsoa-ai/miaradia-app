plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.smsgateway'
version = '0.1.0'

android {
  namespace "expo.modules.smsgateway"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "com.squareup.okhttp3:okhttp:4.9.2"
}
